<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniActivity AI - Espacio de Trabajo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --indigo-brand: #4f46e5;
            --indigo-hover: #4338ca;
            --bg-app: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-app);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Navbar Minimalista Premium */
        .navbar-custom {
            background: linear-gradient(135deg, var(--indigo-brand) 0%, #3b82f6 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tracking-tight {
            letter-spacing: -0.025em;
        }

        .tracking-wide {
            letter-spacing: 0.05em;
        }

        /* Tarjetas con bordes ultra definidos */
        .clean-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .clean-card:hover {
            border-color: #cbd5e1;
        }

        /* Tipografías de etiquetas */
        .label-xs {
            font-size: 0.70rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            display: block;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #ffffff;
            border-color: var(--indigo-brand);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Botones de texto estilo Vercel */
        .btn-text {
            background: none;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            transition: all 0.15s;
        }

        .btn-text-edit {
            color: #0284c7;
        }

        .btn-text-edit:hover {
            background-color: #e0f2fe;
        }

        .btn-text-danger {
            color: #dc2626;
        }

        .btn-text-danger:hover {
            background-color: #fee2e2;
        }

        .btn-text-info {
            color: #4f46e5;
        }

        .btn-text-info:hover {
            background-color: #e0e7ff;
        }

        .btn-brand {
            background-color: var(--indigo-brand);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 0.80rem;
            transition: all 0.2s;
        }

        .btn-brand:hover {
            background-color: var(--indigo-hover);
            color: white;
        }

        /* Badges de estado */
        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .status-active {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status-finished {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark navbar-custom py-3 mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h4 fw-bold tracking-tight">UniActivity AI</span>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end text-white">
                    <small class="d-block opacity-75" style="font-size: 0.70rem; letter-spacing: 0.05em;">CONECTADO
                        COMO</small>
                    <span class="fw-bold tracking-tight" id="userNameDisplay">Cargando...</span>
                    <span class="badge bg-white text-dark ms-2 fw-bold" style="font-size:0.70rem;"
                        id="userRoleBadge">ROL</span>
                </div>
                <button class="btn btn-sm btn-light fw-bold ms-2" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">

            <div class="col-lg-4 col-md-5 mb-4" id="adminPanel" style="display: none;">
                <div class="clean-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0 tracking-tight" id="formTitle">Publicar actividad</h5>
                        <button class="btn-text btn-text-danger p-0" id="btnCancelEdit" onclick="cancelEdit()"
                            style="display:none;">Cancelar</button>
                    </div>

                    <form id="activityForm">
                        <div class="mb-3">
                            <span class="label-xs">Título de la actividad</span>
                            <input type="text" id="actTitle" class="form-control"
                                placeholder="Ej: Defensa de Portafolio" required>
                            <button type="button" class="btn btn-sm btn-light w-100 mt-2 fw-semibold text-muted border"
                                onclick="magicAI()">
                                Generar descripción con IA
                            </button>
                        </div>

                        <div class="mb-3">
                            <span class="label-xs">Descripción y competencias</span>
                            <textarea id="actDesc" class="form-control" rows="3" placeholder="Detalles de evaluación..."
                                required></textarea>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <span class="label-xs">Fecha Inicio</span>
                                <input type="date" id="actStartDate" class="form-control" required>
                            </div>
                            <div class="col-6">
                                <span class="label-xs">Fecha Término</span>
                                <input type="date" id="actEndDate" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-4" id="statusBox" style="display: none;">
                            <span class="label-xs">Estado de ejecución</span>
                            <select id="actStatus" class="form-select fw-semibold">
                                <option value="En curso">En curso (Activa)</option>
                                <option value="Finalizada">Finalizada (Cerrada)</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-brand w-100" id="btnSubmitForm">Publicar ahora</button>
                    </form>
                </div>
            </div>

            <div id="listPanel" class="col-lg-8 col-md-7">
                <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                    <h6 class="fw-bold text-muted m-0 tracking-wide text-uppercase" style="font-size: 0.80rem;">
                        Actividades en el sistema</h6>
                    <button class="btn-text btn-text-edit" onclick="loadActivities()">Actualizar vista</button>
                </div>
                <div id="activitiesList" class="row g-3"></div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalAlumnos" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header bg-dark text-white p-4">
                    <h6 class="modal-title fw-bold tracking-wide text-uppercase" style="font-size:0.85rem;">Control de
                        asistencia: <span id="modalActTitle" class="text-info"></span></h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <table class="table align-middle">
                        <thead>
                            <tr class="text-muted" style="font-size:0.75rem;">
                                <th>ALUMNO INSCRITO</th>
                                <th>ASISTENCIA</th>
                                <th>ESTADO ACADÉMICO</th>
                                <th>ACCIÓN</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAlumnosBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role') || 'Estudiante';
        const activeUser = localStorage.getItem('username') || 'Estudiante UNACH';
        let editingActId = null;

        if (!token) window.location.href = '/index.html';

        const isDocente = (role === 'Admin' || role === 'docente');
        document.getElementById('userNameDisplay').innerText = activeUser;
        document.getElementById('userRoleBadge').innerText = isDocente ? 'DOCENTE' : 'ALUMNO';

        if (isDocente) {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('listPanel').className = 'col-lg-8 col-md-7';
        } else {
            document.getElementById('listPanel').className = 'col-12';
        }

        function escapeHtml(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        async function magicAI() {
            const title = document.getElementById('actTitle').value;
            if (!title) return alert('Escribe el título de la actividad primero.');
            try {
                const res = await fetch('/api/ai/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ title })
                });
                const data = await res.json();
                if (res.ok) document.getElementById('actDesc').value = data.generatedText;
            } catch (e) { alert('Error con el motor de IA.'); }
        }

        document.getElementById('activityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('actTitle').value;
            const description = document.getElementById('actDesc').value;
            const start_date = document.getElementById('actStartDate').value;
            const end_date = document.getElementById('actEndDate').value;
            const status = document.getElementById('actStatus').value;

            const url = editingActId ? `/api/activities/${editingActId}` : '/api/activities';
            const method = editingActId ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title, description, start_date, end_date, status })
            });

            if (res.ok) { cancelEdit(); loadActivities(); }
        });

        function startEdit(id, title, desc, sDate, eDate, status) {
            editingActId = id;
            document.getElementById('actTitle').value = title;
            document.getElementById('actDesc').value = desc;
            document.getElementById('actStartDate').value = sDate;
            document.getElementById('actEndDate').value = eDate;
            document.getElementById('actStatus').value = status || 'En curso';

            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('formTitle').innerText = 'Modificar actividad';
            document.getElementById('btnSubmitForm').innerText = 'Guardar cambios';
            document.getElementById('btnCancelEdit').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingActId = null;
            document.getElementById('activityForm').reset();
            document.getElementById('statusBox').style.display = 'none';
            document.getElementById('formTitle').innerText = 'Publicar actividad';
            document.getElementById('btnSubmitForm').innerText = 'Publicar ahora';
            document.getElementById('btnCancelEdit').style.display = 'none';
        }

        async function loadActivities() {
            const res = await fetch('/api/activities', { headers: { 'Authorization': `Bearer ${token}` } });
            const activities = await res.json();
            const container = document.getElementById('activitiesList');
            container.innerHTML = '';

            activities.forEach(act => {
                const isFinished = (act.status === 'Finalizada');
                const badgeClass = isFinished ? 'status-finished' : 'status-active';

                let card = `
          <div class="col-12">
            <div class="clean-card p-4">
              <div class="d-flex justify-content-between align-items-start mb-1">
                <h5 class="fw-bold m-0 tracking-tight">${act.title}</h5>
                <span class="status-badge ${badgeClass}">${act.status || 'En curso'}</span>
              </div>
              <small class="text-muted fw-semibold d-block mb-3" style="font-size:0.80rem;">
                VIGENCIA: ${act.start_date || 'Sin definir'} — ${act.end_date || 'Sin definir'}
              </small>
              <p class="text-secondary small mb-4" style="white-space: pre-line; line-height: 1.6;">${act.description}</p>
        `;

                if (isDocente) {
                    card += `
            <div class="d-flex gap-1 pt-3 border-top">
              <button class="btn-text btn-text-edit" onclick="startEdit(${act.id}, '${escapeHtml(act.title)}', '${escapeHtml(act.description)}', '${act.start_date}', '${act.end_date}', '${act.status}')">Editar</button>
              <button class="btn-text btn-text-info" onclick="verAlumnos(${act.id}, '${escapeHtml(act.title)}')">Ver alumnos</button>
              <button class="btn-text btn-text-danger ms-auto" onclick="deleteAct(${act.id})">Eliminar</button>
            </div>
          `;
                } else {
                    if (isFinished) {
                        card += `<div class="pt-3 border-top text-end"><span class="btn-text text-muted">Actividad finalizada (Inscripciones cerradas)</span></div>`;
                    } else {
                        card += `<div class="pt-3 border-top text-end"><button class="btn btn-sm btn-dark fw-bold px-4" onclick="inscribirme(${act.id})">Inscribirme a esta actividad</button></div>`;
                    }
                }

                container.innerHTML += card + `</div></div>`;
            });
        }

        async function inscribirme(actId) {
            const res = await fetch('/api/activities/inscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ activity_id: actId })
            });
            if (res.ok) alert('Inscripción registrada. Revisa tu asistencia con el docente.');
            else alert('Ya te encuentras inscrito en esta actividad.');
        }

        async function verAlumnos(actId, title) {
            document.getElementById('modalActTitle').innerText = title;
            new bootstrap.Modal(document.getElementById('modalAlumnos')).show();
            const res = await fetch(`/api/activities/${actId}/participants`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const tbody = document.getElementById('tablaAlumnosBody');
            tbody.innerHTML = '';
            data.forEach(item => {
                tbody.innerHTML += `
          <tr>
            <td class="fw-bold text-dark">${item.username}</td>
            <td><select class="form-select form-select-sm" id="asist_${item.id}"><option value="Pendiente" ${item.asistencia === 'Pendiente' ? 'selected' : ''}>Pendiente</option><option value="Asistió" ${item.asistencia === 'Asistió' ? 'selected' : ''}>Asistió</option><option value="Ausente" ${item.asistencia === 'Ausente' ? 'selected' : ''}>Ausente</option></select></td>
            <td><select class="form-select form-select-sm" id="seg_${item.id}"><option value="En Progreso" ${item.seguimiento === 'En Progreso' ? 'selected' : ''}>En Progreso</option><option value="Completado" ${item.seguimiento === 'Completado' ? 'selected' : ''}>Completado</option></select></td>
            <td><button class="btn btn-sm btn-dark fw-bold" onclick="guardarProgreso(${item.id})">Guardar</button></td>
          </tr>`;
            });
        }

        async function guardarProgreso(inscriptId) {
            const asistencia = document.getElementById(`asist_${inscriptId}`).value;
            const seguimiento = document.getElementById(`seg_${inscriptId}`).value;
            await fetch(`/api/activities/participants/${inscriptId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ asistencia, seguimiento })
            });
        }

        async function deleteAct(id) {
            if (!confirm('¿Eliminar actividad del sistema?')) return;
            await fetch(`/api/activities/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadActivities();
        }

        function logout() { localStorage.clear(); window.location.href = '/index.html'; }
        loadActivities();
    </script>
</body>

</html>
