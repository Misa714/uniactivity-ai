<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniActivity AI - Ingreso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4 text-primary fw-bold">UniActivity AI</h2>

                        <form id="loginForm">
                            <h5 class="mb-3">Iniciar Sesión</h5>
                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input type="text" id="loginUser" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="loginPass" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                        </form>

                        <hr class="my-4">

                        <form id="registerForm">
                            <h5 class="mb-3">Crear Cuenta Nueva</h5>
                            <div class="mb-3">
                                <label class="form-label">Usuario Nuevo</label>
                                <input type="text" id="regUser" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="regPass" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol Académico</label>
                                <select id="regRole" class="form-select">
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Admin">Administrador (Docente)</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Registrarse</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/auth';

        // Lógica de Registro
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUser').value;
            const password = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;

            const res = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            const data = await res.json();
            alert(data.message);
            if (res.ok) document.getElementById('registerForm').reset();
        });

        // Lógica de Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;

            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                window.location.href = '/dashboard.html';
            } else {
                alert(data.message);
            }
        });
    </script>
</body>

</html>
