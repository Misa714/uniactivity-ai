<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniActivity AI - Portal de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --indigo-brand: #4f46e5;
            --indigo-hover: #4338ca;
            --bg-app: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-app);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .main-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 2rem;
        }

        /* Tarjeta principal con bordes finos de alta gama */
        .auth-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        /* Banner izquierdo tipográfico */
        .brand-banner {
            background: linear-gradient(135deg, var(--indigo-brand) 0%, #3b82f6 100%);
            color: white;
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .tracking-tight {
            letter-spacing: -0.025em;
        }

        .tracking-wide {
            letter-spacing: 0.05em;
        }

        /* Contenedor de Pestañas */
        .nav-auth {
            background: #f1f5f9;
            border-radius: 14px;
            padding: 5px;
        }

        .nav-auth .nav-link {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 10px;
            transition: all 0.25s ease;
            padding: 0.65rem 1rem;
        }

        .nav-auth .nav-link.active {
            background: white;
            color: var(--indigo-brand);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        /* Inputs minimalistas premium */
        label.form-label {
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 0.85rem 1.15rem;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #ffffff;
            border-color: var(--indigo-brand);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        /* Botones principales */
        .btn-brand {
            background-color: var(--indigo-brand);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 0.85rem;
            letter-spacing: 0.01em;
            transition: all 0.2s;
        }

        .btn-brand:hover {
            background-color: var(--indigo-hover);
            color: white;
            transform: translateY(-1px);
        }

        .btn-brand:active {
            transform: translateY(0);
        }

        .btn-success-custom {
            background-color: #0f766e;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 0.85rem;
            transition: all 0.2s;
            border: none;
        }

        .btn-success-custom:hover {
            background-color: #115e59;
            color: white;
        }

        /* CLASES PARA ANIMACIÓN DE TRANSICIÓN JS */
        .anim-panel {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .anim-panel-hidden {
            opacity: 0;
            transform: translateY(12px);
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <div class="auth-card">
            <div class="row g-0">

                <div class="col-md-5 brand-banner d-none d-md-flex">
                    <div>
                        <div class="small tracking-wide text-uppercase fw-bold opacity-75 mb-4">
                            Universidad Adventista de Chile
                        </div>
                        <h1 class="fw-bold mb-3 tracking-tight" style="font-size: 2.75rem; line-height: 1.1;">
                            UniActivity AI
                        </h1>
                        <p class="opacity-80 small" style="line-height: 1.6; font-size: 0.95rem;">
                            Plataforma de orquestación académica de alta disponibilidad. Gestiona, planifica y evalúa
                            con asistencia cognitiva determinista.
                        </p>
                    </div>
                    <div class="small opacity-75 fw-medium">
                        Entorno de Producción Seguro
                    </div>
                </div>

                <div class="col-md-7 p-4 p-sm-5 bg-white">
                    <div style="max-width: 380px; margin: 0 auto;">

                        <ul class="nav nav-pills nav-fill nav-auth mb-4" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="tab-login" onclick="switchTab('login')"
                                    type="button">Iniciar sesión</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="tab-register" onclick="switchTab('register')"
                                    type="button">Crear cuenta</button>
                            </li>
                        </ul>

                        <form id="loginForm" class="anim-panel">
                            <div class="mb-3">
                                <label class="form-label">Usuario Institucional</label>
                                <input type="text" id="loginUser" class="form-control" placeholder="Ej: mmeza" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="loginPass" class="form-control" placeholder="••••••••"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-brand w-100 shadow-sm">
                                Acceder al portal
                            </button>
                        </form>

                        <form id="registerForm" class="anim-panel anim-panel-hidden" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">Nuevo Usuario</label>
                                <input type="text" id="regUser" class="form-control" placeholder="Nombre de usuario"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="regPass" class="form-control"
                                    placeholder="Crea una contraseña segura" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Perfil Académico</label>
                                <select id="regRole" class="form-select fw-medium" onchange="checkRoleSecurity()">
                                    <option value="Estudiante" selected>Estudiante (Acceso estándar)</option>
                                    <option value="Admin">Administrador / Docente (Requiere PIN)</option>
                                </select>
                            </div>

                            <div class="mb-4 p-3 bg-light border rounded-3" id="pinSecurityBox" style="display: none;">
                                <label class="form-label text-dark fw-bold">PIN de Autorización Docente</label>
                                <input type="password" id="teacherPinInput" class="form-control"
                                    placeholder="Código de validación">
                                <small class="text-muted d-block mt-1" style="font-size: 0.75rem;">Solicite el código de
                                    perfil docente en Jefatura de Carrera.</small>
                            </div>

                            <button type="submit" class="btn btn-success-custom w-100 shadow-sm">
                                Registrar y verificar
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-4" style="z-index: 9999;">
        <div id="authToast" class="toast align-items-center text-white border-0 shadow-lg" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium px-3 py-2" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Cerrar"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = '/api/auth';
        const SECRET_TEACHER_PIN = "DEV-UNACH-2026";
        let isAnimating = false; // Candado anti-spam de clics

        // --- MOTOR DE TRANSICIÓN ANIMADA ---
        function switchTab(target) {
            if (isAnimating) return;

            const isLogin = target === 'login';
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');

            if ((isLogin && loginForm.style.display === 'block') ||
                (!isLogin && regForm.style.display === 'block')) return;

            isAnimating = true;

            // Actualizar estado visual de las pestañas
            document.getElementById('tab-login').className = `nav-link ${isLogin ? 'active' : ''}`;
            document.getElementById('tab-register').className = `nav-link ${!isLogin ? 'active' : ''}`;

            const outgoingForm = isLogin ? regForm : loginForm;
            const incomingForm = isLogin ? loginForm : regForm;

            // Paso 1: Desvanecer el actual hacia abajo
            outgoingForm.classList.add('anim-panel-hidden');

            setTimeout(() => {
                outgoingForm.style.display = 'none';
                incomingForm.style.display = 'block';

                // Paso 2: Reflow del DOM y deslizar el nuevo hacia arriba
                requestAnimationFrame(() => {
                    incomingForm.classList.remove('anim-panel-hidden');
                    setTimeout(() => { isAnimating = false; }, 200); // Liberar candado
                });
            }, 200);
        }

        function checkRoleSecurity() {
            const role = document.getElementById('regRole').value;
            const pinBox = document.getElementById('pinSecurityBox');
            const pinInput = document.getElementById('teacherPinInput');

            if (role === 'Admin') {
                pinBox.style.display = 'block';
                pinInput.required = true;
                showToast("El perfil Docente requiere código de verificación", "bg-dark");
            } else {
                pinBox.style.display = 'none';
                pinInput.required = false;
                pinInput.value = '';
            }
        }

        function showToast(msg, bgClass = 'bg-danger') {
            const toastEl = document.getElementById('authToast');
            toastEl.className = `toast align-items-center text-white border-0 shadow-lg ${bgClass}`;
            document.getElementById('toastMsg').innerText = msg;
            bootstrap.Toast.getOrCreateInstance(toastEl).show();
        }

        // --- ENVIAR REGISTRO ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;

            if (role === 'Admin') {
                if (document.getElementById('teacherPinInput').value !== SECRET_TEACHER_PIN) {
                    showToast("Código de autorización docente denegado");
                    return;
                }
            }

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast("Cuenta creada con éxito. Inicia sesión.", "bg-success");
                    document.getElementById('registerForm').reset();
                    checkRoleSecurity();
                    switchTab('login');
                } else { showToast(data.message || "El usuario ya existe"); }
            } catch (err) { showToast("Error de conexión con el servidor"); }
        });

        // --- ENVIAR LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('username', username); // <--- AÑADIMOS ESTA LÍNEA MÁGICA
                    window.location.href = '/dashboard.html';
                } else { showToast(data.message || "Credenciales incorrectas"); }
            } catch (err) { showToast("Error al intentar conectar con la base de datos"); }
        });
    </script>
</body>

</html>
